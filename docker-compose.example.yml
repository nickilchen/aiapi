version: '3.8'

services:
  aiclient2api:
    # 使用预构建镜像（推荐）
    image: <username>/aiclient2api:latest
    
    # 或者使用本地构建
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    
    container_name: aiclient2api
    hostname: aiclient2api
    
    # 端口映射
    ports:
      - "3000:3000"          # 主服务端口
      - "8085:8085"          # TLS Sidecar 端口 1
      - "8086:8086"          # TLS Sidecar 端口 2
      - "19876-19880:19876-19880"  # OAuth 回调端口范围
    
    # 卷挂载
    volumes:
      - ./configs:/app/configs
      - ./logs:/app/logs
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      # 自定义启动参数（可选）
      # - ARGS=--api-key mykey --port 3000
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 网络配置
    networks:
      - aiclient2api-network

# 网络定义
networks:
  aiclient2api-network:
    driver: bridge
